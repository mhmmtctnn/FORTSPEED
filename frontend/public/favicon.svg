<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>

  <!-- Glow — left node -->
  <circle cx="13" cy="32" fill="#38bdf8">
    <animate attributeName="r" values="10;14;10" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.28;0.12" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Glow — right node -->
  <circle cx="51" cy="32" fill="#818cf8">
    <animate attributeName="r" values="10;14;10" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.28;0.12" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection base track -->
  <line x1="17" y1="32" x2="47" y2="32" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Animated dashes flowing left → right -->
  <line x1="17" y1="32" x2="47" y2="32"
        stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"
        stroke-dasharray="6 5" opacity="0.7">
    <animate attributeName="stroke-dashoffset" from="33" to="0" dur="1.6s" repeatCount="indefinite"/>
  </line>

  <!-- Left node (cyan) -->
  <circle cx="13" cy="32" fill="url(#gL)" stroke="#38bdf8" stroke-width="1.5">
    <animate attributeName="r" values="7.5;9;7.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Left node center dot -->
  <circle cx="13" cy="32" r="2.5" fill="#e0f2fe" opacity="0.9"/>

  <!-- Right node (indigo) -->
  <circle cx="51" cy="32" fill="url(#gR)" stroke="#818cf8" stroke-width="1.5">
    <animate attributeName="r" values="7.5;9;7.5" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <!-- Right node center dot -->
  <circle cx="51" cy="32" r="2.5" fill="#e0e7ff" opacity="0.9"/>

  <!-- Moving data packet -->
  <circle cy="32" r="3.5" fill="#ffffff">
    <animate attributeName="cx" from="17" to="47" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.95;0.95;0" keyTimes="0;0.06;0.94;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Second packet — delayed (bidirectional feel) -->
  <circle cy="32" r="2" fill="#c7d2fe" opacity="0">
    <animate attributeName="cx" from="47" to="17" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.94;1" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Small upward arc at midpoint — "ops" monitor pulse -->
  <path d="M26 32 Q32 22 38 32" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.15;0.85;1" dur="2.2s" repeatCount="indefinite"/>
  </path>

  <defs>
    <linearGradient id="gL" x1="13" y1="23" x2="13" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="gR" x1="51" y1="23" x2="51" y2="41" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
  </defs>
</svg>
