<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#0277BD"/>
  <!-- Dish base pole -->
  <line x1="32" y1="46" x2="32" y2="54" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="54" x2="40" y2="54" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Dish bowl (parabola arc) -->
  <path d="M14 22 Q32 46 50 22" stroke="white" stroke-width="3" fill="rgba(255,255,255,0.15)" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="14" y1="22" x2="50" y2="22" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Feed arm -->
  <line x1="32" y1="46" x2="22" y2="28" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <circle cx="21" cy="27" r="3" fill="white"/>
  <!-- Signal waves from above -->
  <path d="M32 8 Q38 11 32 14 Q26 17 32 20" stroke="rgba(255,255,255,0.7)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
