name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fortspeed

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Type check backend
        run: cd backend && npm run typecheck

      - name: Type check frontend
        run: cd frontend && npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run smoke tests (route registry + response contracts)
        run: npm run test:smoke

      - name: Run utility tests
        run: npm run test:utils

      - name: Run backend tests with coverage
        run: cd backend && npm run test:coverage

      - name: Run frontend tests with coverage
        run: cd frontend && npm run test:coverage

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  build:
    name: Build & Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Docker build backend
        run: docker build -t fortspeed-backend:ci ./backend

      - name: Docker build frontend
        run: docker build -t fortspeed-frontend:ci ./frontend

      - name: Security audit - root
        run: npm audit --audit-level=high || true

      - name: Security audit - backend
        run: cd backend && npm audit --audit-level=high || true

      - name: Security audit - frontend
        run: cd frontend && npm audit --audit-level=high || true

  publish:
    name: Publish Docker Images
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VER=$(node -p "require('./backend/package.json').version")
          echo "app_version=${VER}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Determine Docker tags
        id: tags
        run: |
          VER="${{ steps.version.outputs.app_version }}"
          SHA="sha-${{ steps.version.outputs.short_sha }}"

          # Community edition tags (standalone)
          COMMUNITY="${REGISTRY}/${IMAGE_NAME}:latest"
          COMMUNITY="${COMMUNITY},${REGISTRY}/${IMAGE_NAME}:${VER}"
          COMMUNITY="${COMMUNITY},${REGISTRY}/${IMAGE_NAME}:${SHA}"

          # ITAI edition tags (Hub integration)
          ITAI="${REGISTRY}/${IMAGE_NAME}:latest-itai"
          ITAI="${ITAI},${REGISTRY}/${IMAGE_NAME}:${VER}-itai"
          ITAI="${ITAI},${REGISTRY}/${IMAGE_NAME}:${SHA}-itai"

          # Frontend Community tags
          FE_COMMUNITY="${REGISTRY}/${IMAGE_NAME}-frontend:latest"
          FE_COMMUNITY="${FE_COMMUNITY},${REGISTRY}/${IMAGE_NAME}-frontend:${VER}"
          FE_COMMUNITY="${FE_COMMUNITY},${REGISTRY}/${IMAGE_NAME}-frontend:${SHA}"

          # Frontend ITAI tags
          FE_ITAI="${REGISTRY}/${IMAGE_NAME}-frontend:latest-itai"
          FE_ITAI="${FE_ITAI},${REGISTRY}/${IMAGE_NAME}-frontend:${VER}-itai"
          FE_ITAI="${FE_ITAI},${REGISTRY}/${IMAGE_NAME}-frontend:${SHA}-itai"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            COMMUNITY="${COMMUNITY},${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}"
            ITAI="${ITAI},${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}-itai"
            FE_COMMUNITY="${FE_COMMUNITY},${REGISTRY}/${IMAGE_NAME}-frontend:${GITHUB_REF_NAME}"
            FE_ITAI="${FE_ITAI},${REGISTRY}/${IMAGE_NAME}-frontend:${GITHUB_REF_NAME}-itai"
          fi

          echo "community=${COMMUNITY}" >> "$GITHUB_OUTPUT"
          echo "itai=${ITAI}" >> "$GITHUB_OUTPUT"
          echo "fe_community=${FE_COMMUNITY}" >> "$GITHUB_OUTPUT"
          echo "fe_itai=${FE_ITAI}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Community edition
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.community }}
          build-args: ITAI_MODE=false
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=FORTSPEED Community Edition (standalone)

      - name: Build and push ITAI edition
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.itai }}
          build-args: ITAI_MODE=true
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=FORTSPEED ITAI Edition (Hub integration)

      - name: Build and push Frontend Community edition
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.tags.outputs.fe_community }}
          build-args: ITAI_MODE=false
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=FORTSPEED Frontend Community Edition (standalone)

      - name: Build and push Frontend ITAI edition
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.tags.outputs.fe_itai }}
          build-args: ITAI_MODE=true
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=FORTSPEED Frontend ITAI Edition (Hub integration)
