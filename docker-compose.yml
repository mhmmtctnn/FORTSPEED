services:
  # 1. Database: PostgreSQL
  db:
    image: postgres:16
    container_name: speedtest_db
    restart: always
    environment:
      - POSTGRES_PASSWORD=SecurePassword123
      - POSTGRES_DB=speedtest_db
    volumes:
      - ./database/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - speedtest_network

  # 2. Redis: Real-time updates
  redis:
    image: redis:7-alpine
    container_name: speedtest_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - speedtest_network

  # 3. Backend: Webhook Ingestion & API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    pull_policy: never
    container_name: speedtest_backend
    restart: always
    environment:
      - DATABASE_URL=postgres://postgres:SecurePassword123@db:5432/speedtest_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - PORT=3000
      - ITAI_MODE=${ITAI_MODE:-false}
      - ITAI_JWT_SECRET=${ITAI_JWT_SECRET:-}
      - FORTSPEED_API_KEY=${FORTSPEED_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
    networks:
      - speedtest_network

  # 4. Frontend: React + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    pull_policy: never
    container_name: speedtest_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - speedtest_network

networks:
  speedtest_network:
    driver: bridge

volumes:
  postgres_data:
